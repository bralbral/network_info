name: Daily Database Export

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

concurrency:
  group: daily-export
  cancel-in-progress: true

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate date tag
        id: date
        run: |
          echo "tag=daily-$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "filename=block_dump_$(date +'%Y-%m-%d').csv.gz" >> $GITHUB_OUTPUT

      - name: Start docker-compose services
        run: |
          docker compose up -d db
          
      - name: Wait for database to be ready
        run: |
          echo "Waiting for database to be ready..."
          for i in {1..60}; do
            if docker compose exec -T db pg_isready > /dev/null 2>&1; then
              echo "Database is ready"
              break
            fi
            echo "Attempt $i/60: Database not ready yet..."
            sleep 5
          done
          
      - name: Download RIR dumps
        run: |
          ./download_dumps.sh
          
      - name: Build and run network_info container
        env:
          DB_CONNECTION: postgresql+psycopg://network_info:network_info@db:5432/network_info
        run: |
          docker compose build network_info
          docker compose run --rm network_info -c "$DB_CONNECTION"
          
      - name: Export database to gzip
        run: |
          ./bin/export_to_gzip -o ${{ steps.date.outputs.filename }}
          
      - name: Get file info
        id: file_info
        run: |
          echo "size=$(stat -c%s ${{ steps.date.outputs.filename }})" >> $GITHUB_OUTPUT
          echo "human_size=$(du -h ${{ steps.date.outputs.filename }} | cut -f1)" >> $GITHUB_OUTPUT
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.date.outputs.tag }}
          name: Network Info Dump - ${{ steps.date.outputs.date }}
          body: |
            Automated daily export of network information database.
            
            **Date:** ${{ steps.date.outputs.date }}
            **File Size:** ${{ steps.file_info.outputs.human_size }}
            **Records:** Full RIR database dump
            
            This release contains the complete network block information from all Regional Internet Registries (ARIN, RIPE, APNIC, LACNIC, AfriNIC).
            
            Generated by GitHub Actions workflow.
          files: ${{ steps.date.outputs.filename }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Cleanup old releases (keep last 7 days)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get list of daily releases
          releases=$(gh release list --limit 100 --json tagName,name --jq '.[] | select(.tagName | startswith("daily-")) | .tagName')
          
          # Keep only last 7 releases
          count=0
          for release in $releases; do
            count=$((count + 1))
            if [ $count -gt 7 ]; then
              echo "Deleting old release: $release"
              gh release delete "$release" --yes
            fi
          done
          
      - name: Cleanup docker containers
        if: always()
        run: |
          docker compose down -v
